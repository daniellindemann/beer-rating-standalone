---

name: beer-rating-standalone

services:
  backend:
    image: beer-rating-backend:10
    build:
      context: .
      dockerfile: src/Demo.BeerRating.Backend/Dockerfile
    container_name: beer-rating-backend
    restart: unless-stopped
    ports:
    - "5178:5178"
    environment:
    - "Database__UseInMemoryDatabase=true"
  cosole-beer-quotes:
    image: beer-rating-console-beerquotes:10
    build:
      context: .
      dockerfile: src/Demo.BeerRating.Console.BeerQuotes/Dockerfile
    container_name: beer-rating-console-beerquotes
    restart: unless-stopped
    environment:
    - "QuoteSleepInSeconds=30"
  frontend:
    image: beer-rating-frontend:10
    build:
      context: .
      dockerfile: src/Demo.BeerRating.Frontend/Dockerfile
    container_name: beer-rating-frontend
    restart: unless-stopped
    ports:
    - "5179:5179"
    environment:
    - "Backend__HostUrl=http://backend:5178"

networks:
  default:
    name: azure-container-hosting
